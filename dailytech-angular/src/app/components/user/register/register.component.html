<hr class="bar-white" />
<h2><span class="daily-tech  title  monoton text-box">OUR DAILY TECH</span></h2>
<hr class="bar-white" />

<section class="auth-shell">
  <mat-card class="auth-panel">
    <section class="register-form">
      <form class="centered-form" (ngSubmit)="onFirebaseRegister(f)" #f="ngForm">
        <h3 class="auth-heading daily-tech monoton">REGISTER</h3>

        <mat-form-field appearance="outline">
          <input type="email" matInput placeholder="Email" ngModel name="email" required #emailInput="ngModel" />
          <mat-error *ngIf="!emailInput.hasError('required')">E-Mail is invalid</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <input
            type="password"
            matInput
            placeholder="Password"
            ngModel
            name="password"
            required
            minlength="6"
            #pwInput="ngModel"
          />
          <mat-hint *ngIf="pwInput.value?.length<5">Should be at least 6 characters long</mat-hint>
          <mat-hint align="end">{{ pwInput.value?.length }} / 6</mat-hint>
        </mat-form-field>

        <div class="row">
          <button *ngIf="!(isLoading$ | async)" type="submit" mat-raised-button color="primary">
            REGISTER
          </button>
          <button
            *ngIf="!(isLoading$ | async)"
            type="button"
            mat-raised-button
            routerLink="/login"
            color="basic"
          >
            CANCEL
          </button>
        </div>
      </form>
    </section>
  </mat-card>
</section>
