<hr class="bar-white" />
<h2><span class="daily-tech  title  monoton text-box">OUR DAILY TECH</span></h2>
<hr class="bar-white" />

<section class="auth-shell">
  <mat-tab-group mat-align-tabs="center" class="auth-tabs">
    <mat-tab label="SIGN ON">
      <mat-card class="auth-panel">
        <section class="auth-form-section">
          <form *ngIf="!adminFlag" class="centered-form" [formGroup]="loginForm" (ngSubmit)="handleFirebaseLogin()">

            <mat-form-field appearance="outline">
              <input type="email" matInput placeholder="Email" class="form-control" name="email" color="primary"
                formControlName="email" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <input type="password" matInput placeholder="Password" class="form-control" name="password"
                formControlName="password" />
            </mat-form-field>

            <mat-card-actions>
              <div class="row">
                <button type="submit" mat-raised-button color="primary">LOGIN</button>
                <button type="button" mat-raised-button color="basic">CANCEL</button>
              </div>
            </mat-card-actions>
            
            <br />
            <hr />
            <br />
          </form>
          <p *ngIf="!adminFlag" type="button" class="admin-flag" mat-button (click)="adminOpen()">
           admin login
          </p>
          <form *ngIf="adminFlag" class="centered-form" (ngSubmit)="handleAwsAuthLogin(fAdmin)" #fAdmin="ngForm">
            <h3 class="auth-heading daily-tech monoton">ADMINISTRATION LOGIN</h3>

            <mat-form-field appearance="outline">
              <input type="email" matInput placeholder="Email" ngModel name="email" #email />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <input type="password" matInput placeholder="Password" ngModel name="password" #password />
            </mat-form-field>

            <div class="row buttons">
              <button *ngIf="!(isLoading$ | async)" type="submit" mat-raised-button color="primary">
                LOGIN
              </button>
              <button *ngIf="!(isLoading$ | async)" type="button" mat-raised-button color="basic">
                CANCEL
              </button>
            </div>
          </form>

            <br />
          <p *ngIf="adminFlag" type="button" class="admin-flag" mat-button (click)="adminOpen()">
            back to USER LOGIN
          </p>
        </section>
      </mat-card>
    </mat-tab>

    <mat-tab  *ngIf="!adminFlag"  style="color:darkblue" label="REGISTER">
      <mat-card class="auth-panel">
        <section class="register-form">
          <form class="centered-form" (ngSubmit)="onRegister(f)" #f="ngForm"> 

            <mat-form-field appearance="outline">
              <input type="email" matInput placeholder="Email" ngModel name="email" required #emailInput="ngModel" />
              <mat-error *ngIf="!emailInput.hasError('required')">E-Mail is invalid</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <input type="password" matInput placeholder="Password" ngModel name="password" required minlength="6"
                #pwInput="ngModel" />
              <mat-hint *ngIf="pwInput.value?.length<5 && pwInput.touched" align="start">
                <small>Password at least 6 characters</small>
              </mat-hint>
              <mat-hint align="end"  *ngIf="pwInput.touched">
                <small>{{ pwInput.value?.length }} / 6</small>
              </mat-hint>
            </mat-form-field>
            <br />
            <div class="row">
              <button *ngIf="!(isLoading$ | async)" type="submit" mat-raised-button color="primary">
                REGISTER
              </button>
              <button *ngIf="!(isLoading$ | async)" type="button" mat-raised-button routerLink="/login" color="basic">
                CANCEL
              </button>
            </div>
          </form>
        </section>
      </mat-card>
    </mat-tab>
  </mat-tab-group>
</section>
