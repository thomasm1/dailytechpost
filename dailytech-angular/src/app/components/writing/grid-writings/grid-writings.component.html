<div class="centered-row">
  <mat-form-field class="flex-40">
    <!-- <input type="text" (keyup)="blogFilter($event.target.value)" placeholder="Mod Filter"> -->
    <input matInput type="text" (keyup)="blogFilter($any($event.target).value)" placeholder="Mod Filter">
  </mat-form-field>
</div>

<mat-table [dataSource]="dataSource" matSort>


 <ng-container matColumnDef="did">
    <mat-header-cell *matHeaderCellDef mat-sort-header class="did">Date</mat-header-cell>
    <mat-cell *matCellDef="let element" class="did"><small>{{ element.did }}</small></mat-cell>
  </ng-container>
  <ng-container matColumnDef="title">
    <mat-header-cell *matHeaderCellDef mat-sort-header class="post">Title</mat-header-cell>
    <mat-cell *matCellDef="let element" class="title">{{ element.title }}</mat-cell>
  </ng-container> 
    <ng-container matColumnDef="post">
    <mat-header-cell *matHeaderCellDef mat-sort-header class="post">Post</mat-header-cell>
    <mat-cell *matCellDef="let element" class="post">{{ element.post }}</mat-cell>
  </ng-container>
    <ng-container matColumnDef="cat3">
    <mat-header-cell *matHeaderCellDef mat-sort-header class="cat3">Category</mat-header-cell>
    <mat-cell *matCellDef="let element" class="cat3">{{ element.cat3 }}</mat-cell>
  </ng-container>
  <ng-container matColumnDef="wordCount">
    <mat-header-cell *matHeaderCellDef mat-sort-header>Word Count</mat-header-cell>
    <mat-cell *matCellDef="let element">{{ element.wordCount | number }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="durationGoal">
    <mat-header-cell *matHeaderCellDef mat-sort-header>Duration</mat-header-cell>
    <mat-cell *matCellDef="let element">{{ element.durationGoal | number }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="state">
    <mat-header-cell *matHeaderCellDef mat-sort-header>State</mat-header-cell>
    <mat-cell *matCellDef="let element">{{ element.state }}</mat-cell>
  </ng-container>
  <ng-container matColumnDef="date">
    <mat-header-cell *matHeaderCellDef mat-sort-header>Date</mat-header-cell>
    <mat-cell *matCellDef="let element">{{ element.date.toDate() | date:'yyyy/MM/dd h:mm:ss a'}}</mat-cell>
  </ng-container>
  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns:displayedColumns; "></mat-row>

</mat-table>

<div class="paginator-wrap">
  <mat-paginator [pageSize]="15" [pageSizeOptions]="[10, 15, 20, 30, 40]"></mat-paginator>
</div>
