<section class="link">
  <div class="link-form">
    <form class="add-link-form" #linkForm="ngForm" (ngSubmit)="onAddLink(linkForm)">

      <input #csvInput type="file" accept=".csv,text/csv" hidden (change)="onCsvSelected($event)" />
      <button
        type="button"
        class="add-link-button"
        [disabled]="isUploadingCsv"
        matTooltip="CSV columns: url, *description*, *categoryId*. (*Optional)."
        (click)="csvInput.click()"
      >
        <mat-icon>upload_file</mat-icon>
        <span>{{ isUploadingCsv ? 'Uploading' : 'Upload CSV' }}</span>
      </button>

      <button
        type="button"
        class="add-link-button"
        [disabled]="isSaving"
        (click)="openAddLinkDialog()"
      >
        <mat-icon>add_link</mat-icon>
        <span>{{ isSaving ? 'Saving' : 'Add Link' }}</span>
      </button>

    </form>
  </div>

  <div class="link-shell">
    <div class="link-tree">
      <div class="tree-root">
        <mat-icon>account_tree</mat-icon>
        <span>My Links</span>
      </div>

      <div class="tree-children">
        <ng-container *ngFor="let category of categoryMods$ | async">
          <button mat-button type="button" class="link-node" (click)="openLinkCategory(category)">
            <span class="node-connector"></span>
            <mat-icon class="node-icon">chevron_right</mat-icon>
            <span class="link-name">{{ getCategoryLabel(category) }}</span>
          </button>

          <ng-container *ngFor="let child of category.children || []">
            <button mat-button type="button" class="link-node child-link-node" (click)="openLinkCategory(child)">
              <span class="node-connector"></span>
              <mat-icon class="node-icon">subdirectory_arrow_right</mat-icon>
              <span class="link-name">{{ getCategoryLabel(child) }}</span>
            </button>
          </ng-container>
        </ng-container>
      </div>
    </div>
    <div>
      <app-links></app-links>
    </div>
  </div>
</section>
